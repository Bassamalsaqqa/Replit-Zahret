packages:
  "framer-motion": "For smooth page transitions and beautiful scroll reveal animations"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For validating forms with Zod"
  "zod": "For strict form validation schemas"
  "lucide-react": "For beautiful, consistent iconography"

images:
  - path: "artifacts/zahrat-al-madain/public/images/hero-abstract.png"
    description: "Abstract warm gradient mesh combining earthy olive green, warm gold, and soft cream tones with soft light leaks. Minimalist, dignified, and hopeful."
    aspect_ratio: "16:9"
  - path: "artifacts/zahrat-al-madain/public/images/olive-branch.png"
    description: "Minimalist, elegant illustration of a Palestinian olive branch in soft gold and olive green on a transparent background."
    aspect_ratio: "1:1"
  - path: "artifacts/zahrat-al-madain/public/images/pattern-mesh.png"
    description: "Subtle geometric pattern combining traditional middle eastern motifs with modern abstract shapes in very faint beige and gold. Used as a background texture."
    aspect_ratio: "16:9"
  - path: "artifacts/zahrat-al-madain/public/images/community-hands.png"
    description: "Stylized, elegant line art illustration of diverse hands supporting each other, colored in warm earth tones."
    aspect_ratio: "1:1"

notes:
  - Full RTL/LTR support implemented via document dir="rtl" and CSS logical properties (ps-, pe-, ms-, me-).
  - No backend API exists; all forms simulate submission and redirect to a thank you page.
  - Context API used for global language state management.
